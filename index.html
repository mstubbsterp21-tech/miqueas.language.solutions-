        function replaceAvailabilityText(value) {
          return availabilityReplacements.reduce(
            (text, [oldValue, newValue]) => text.split(oldValue).join(newValue),
            String(value || '')
          );
        }

        function normalizeAvailabilityLabels() {
          const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
          let node;

          while ((node = walker.nextNode())) {
            const updated = replaceAvailabilityText(node.nodeValue);
            if (updated !== node.nodeValue) node.nodeValue = updated;
          }
        }

        function normalizeRequestBody(body) {
          if (body instanceof URLSearchParams) {
            const normalized = new URLSearchParams();
            body.forEach((value, key) => normalized.append(key, replaceAvailabilityText(value)));
            return normalized;
          }

          return body;
        }

        const originalFetch = window.fetch;
        window.fetch = function (resource, options) {
          if (options && options.body) {
            return originalFetch.call(this, resource, { ...options, body: normalizeRequestBody(options.body) });
          }

          return originalFetch.apply(this, arguments);
        };

        const observer = new MutationObserver(normalizeAvailabilityLabels);

            normalizeAvailabilityLabels();
