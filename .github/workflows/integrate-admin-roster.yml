name: Integrate admin roster

on:
  push:
    branches:
      - agent/embed-admin-roster
    paths:
      - .github/workflows/integrate-admin-roster.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/embed-admin-roster
      - name: Embed roster in admin portal
        run: |
          python - <<'PY'
          from pathlib import Path

          portal = Path('src/pages/InterpreterPortal.jsx')
          text = portal.read_text()
          import_line = 'import AdminInterpreters from "./AdminInterpreters";\n'
          anchor = 'import logo from "../logo.png";\n'
          if import_line not in text:
              text = text.replace(anchor, anchor + import_line)

          old = '{portal === "admin" && <AdminView workspace={workspace} invite={invite} setInvite={setInvite} inviteUser={inviteUser} docRequest={docRequest} setDocRequest={setDocRequest} requestDocument={requestDocument} updateAssignment={updateAssignment} adminBusy={adminBusy} openClient={(id) => { setSelectedClient(id); setPortal("client"); }} openInterpreter={(id) => { setSelectedInterpreter(id); setPortal("interpreter"); }} />}'
          new = '{portal === "admin" && <><AdminView workspace={workspace} invite={invite} setInvite={setInvite} inviteUser={inviteUser} docRequest={docRequest} setDocRequest={setDocRequest} requestDocument={requestDocument} updateAssignment={updateAssignment} adminBusy={adminBusy} openClient={(id) => { setSelectedClient(id); setPortal("client"); }} openInterpreter={(id) => { setSelectedInterpreter(id); setPortal("interpreter"); }} /><div className="mt-7"><AdminInterpreters palette={palette} embedded /></div></>}'
          if old not in text:
              raise SystemExit('Admin portal render anchor not found')
          text = text.replace(old, new)
          portal.write_text(text)

          roster = Path('src/pages/AdminInterpreters.jsx')
          text = roster.read_text()
          text = text.replace('export default function AdminInterpreters({ palette }) {', 'export default function AdminInterpreters({ palette, embedded = false }) {')
          text = text.replace('<div className="min-h-screen px-5 py-12 md:px-8" style={{ background }}>', '<div className={embedded ? "" : "min-h-screen px-5 py-12 md:px-8"} style={embedded ? undefined : { background }}>')
          text = text.replace('<div className="mx-auto max-w-[96rem]">', '<div className={embedded ? "" : "mx-auto max-w-[96rem]"}>', 1)
          header_start = '        <header className="rounded-[2rem] border p-6 shadow-sm md:p-8" style={panel}>'
          header_end = '        </header>'
          start = text.find(header_start)
          end = text.find(header_end, start)
          if start == -1 or end == -1:
              raise SystemExit('Roster header anchors not found')
          end += len(header_end)
          header_block = text[start:end]
          text = text[:start] + '        {!embedded && (\n' + header_block + '\n        )}' + text[end:]
          roster.write_text(text)
          PY
      - name: Remove one-time workflow
        run: git rm .github/workflows/integrate-admin-roster.yml
      - name: Commit integrated admin roster
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages/InterpreterPortal.jsx src/pages/AdminInterpreters.jsx
          git commit -m "feat: embed interpreter roster filters in admin portal"
          git push origin HEAD:agent/embed-admin-roster
